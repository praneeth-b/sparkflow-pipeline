x-airflow-common:
  &airflow-common
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
    AIRFLOW__WEBSERVER__SECRET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "spark://spark:7077"}'
    SPARK_HOME: /home/airflow/.local/lib/python3.12/site-packages/pyspark
    SPARK_SCALA_VERSION: "2.12"
    SPARK_LOCAL_HOSTNAME: airflow-scheduler
    SPARK_SUBMIT_OPTS: "-Djava.net.preferIPv4Stack=true"
    PYSPARK_PYTHON: python3
    PYSPARK_DRIVER_PYTHON: python3
    PYTHONPATH: /home/airflow/.local/lib/python3.12/site-packages
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Postgres ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:13
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - olist_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Airflow init (runs db migrate + creates admin user, then exits) ───────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"
    networks:
      - olist_network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Airflow webserver ─────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    restart: always
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 30s
      retries: 5
    networks:
      - olist_network
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      spark:
        condition: service_started

  # ── Airflow scheduler ─────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    restart: always
    command: scheduler
    networks:
      - olist_network
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      spark:
        condition: service_started

  # ── Spark master ──────────────────────────────────────────────────────────────
  spark:
    build: .
    container_name: spark
    restart: always
    entrypoint: []
    environment:
      SPARK_HOME: /home/airflow/.local/lib/python3.12/site-packages/pyspark
      SPARK_SCALA_VERSION: "2.12"
      PYTHONPATH: /home/airflow/.local/lib/python3.12/site-packages
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
    # Use a single-line java command — the YAML '>' block scalar joins lines
    # with spaces which bash then mis-parses as separate commands. Using a
    # pipe '|' block scalar preserves real newlines so bash reads the whole
    # java invocation as one statement via the trailing backslashes.
    command:
      - /bin/bash
      - -c
      - |
        mkdir -p /tmp/spark-work /tmp/spark-local && \
        /usr/lib/jvm/java-17-openjdk-arm64/bin/java \
          -Djava.net.preferIPv4Stack=true \
          -Dspark.local.dirs=/tmp/spark-local \
          -cp '/home/airflow/.local/lib/python3.12/site-packages/pyspark/jars/*' \
          org.apache.spark.deploy.master.Master \
          --host spark \
          --port 7077 \
          --webui-port 9090
    ports:
      - "9090:9090"
      - "7077:7077"
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    networks:
      - olist_network

  # ── Spark worker ──────────────────────────────────────────────────────────────
  spark-worker:
    build: .
    container_name: spark-worker
    restart: always
    entrypoint: []
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2G
      SPARK_HOME: /home/airflow/.local/lib/python3.12/site-packages/pyspark
      SPARK_SCALA_VERSION: "2.12"
      PYTHONPATH: /home/airflow/.local/lib/python3.12/site-packages
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
    command:
      - /bin/bash
      - -c
      - |
        mkdir -p /tmp/spark-work /tmp/spark-local && \
        /usr/lib/jvm/java-17-openjdk-arm64/bin/java \
          -Djava.net.preferIPv4Stack=true \
          -Dspark.local.dirs=/tmp/spark-local \
          -Dspark.worker.dir=/tmp/spark-work \
          -DSPARK_SCALA_VERSION=2.12 \
          -cp '/home/airflow/.local/lib/python3.12/site-packages/pyspark/jars/*' \
          org.apache.spark.deploy.worker.Worker \
          --work-dir /tmp/spark-work \
          spark://spark:7077
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    depends_on:
      - spark
    networks:
      - olist_network

networks:
  olist_network:
    name: olist_docker_net
    driver: bridge

volumes:
  postgres_data: {}