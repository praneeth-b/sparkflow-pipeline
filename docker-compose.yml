x-airflow-common:
  &airflow-common
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
    AIRFLOW__WEBSERVER__SECRET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    
    # Strictly enforce the 'spark://' prefix. Renamed host to 'spark' to avoid hyphen DNS issues.
    AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "spark://spark:7077"}'
    
    # Explicitly define SPARK_HOME so the Airflow worker can find the spark-submit binaries
    SPARK_HOME: /home/airflow/.local/lib/python3.12/site-packages/pyspark
    
    # Force the Spark Driver (Airflow) to advertise its exact hostname to the workers
    SPARK_LOCAL_HOSTNAME: airflow-scheduler

    # Force Java on Apple Silicon to use IPv4 for DNS resolution to prevent UnknownHostException
    SPARK_SUBMIT_OPTS: "-Djava.net.preferIPv4Stack=true"

  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  # --- Airflow Core ---
  postgres:
    image: postgres:13
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - olist_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    restart: always
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 30s
      retries: 5
    networks:
      - olist_network
    depends_on:
      postgres:
        condition: service_healthy
      spark:
        condition: service_started

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    restart: always
    command: scheduler
    networks:
      - olist_network
    depends_on:
      postgres:
        condition: service_healthy
      spark:
        condition: service_started

  # --- Spark Cluster ---
  # Renamed to "spark" (no hyphens) for bulletproof Java DNS resolution
  spark:
    build: .
    container_name: spark
    restart: always
    environment:
      SPARK_DAEMON_JAVA_OPTS: "-Djava.net.preferIPv4Stack=true"
      SPARK_HOME: /home/airflow/.local/lib/python3.12/site-packages/pyspark
    # Explicitly use Java to launch the master, avoiding Python ModuleNotFound errors
    command: >
      /bin/bash -c "
      /usr/lib/jvm/java-17-openjdk-arm64/bin/java
      -Djava.net.preferIPv4Stack=true
      -cp '/home/airflow/.local/lib/python3.12/site-packages/pyspark/jars/*'
      org.apache.spark.deploy.master.Master
      --host spark
      --port 7077
      --webui-port 9090"
    ports:
      - "9090:9090" # Spark UI
      - "7077:7077"
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    networks:
      - olist_network

  spark-worker:
    build: .
    container_name: spark-worker
    restart: always
    environment:
      SPARK_WORKER_CORES: 2 # Adjust based on your M4 capacity
      SPARK_WORKER_MEMORY: 2G
      SPARK_DAEMON_JAVA_OPTS: "-Djava.net.preferIPv4Stack=true"
      SPARK_HOME: /home/airflow/.local/lib/python3.12/site-packages/pyspark
    # Explicitly use Java to launch the worker
    command: >
      /bin/bash -c "
      /usr/lib/jvm/java-17-openjdk-arm64/bin/java
      -Djava.net.preferIPv4Stack=true
      -cp '/home/airflow/.local/lib/python3.12/site-packages/pyspark/jars/*'
      org.apache.spark.deploy.worker.Worker
      spark://spark:7077"
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    networks:
      - olist_network

  spark-worker:
    build: .
    container_name: spark-worker
    restart: always
    environment:
      SPARK_WORKER_CORES: 2 # Adjust based on your M4 capacity
      SPARK_WORKER_MEMORY: 2G
      SPARK_DAEMON_JAVA_OPTS: "-Djava.net.preferIPv4Stack=true"
      SPARK_HOME: /home/airflow/.local/lib/python3.12/site-packages/pyspark
    # Use PySpark's official native launcher
    command: >
      /bin/bash -c "/home/airflow/.local/lib/python3.12/site-packages/pyspark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077"
    volumes:
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    depends_on:
      - spark
    networks:
      - olist_network

networks:
  olist_network:
    name: olist_docker_net # Explicitly named to enforce strict DNS resolution
    driver: bridge

volumes:
  postgres_data: